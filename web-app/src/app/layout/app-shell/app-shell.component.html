<!-- Mobile toolbar: only visible on mobile, contains hamburger button -->
@if (isMobile()) {
  <mat-toolbar class="mobile-toolbar" color="primary">
    <button mat-icon-button (click)="toggleSidenav()" aria-label="Abrir menú">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="mobile-title">Gestiora</span>
  </mat-toolbar>
}

<mat-sidenav-container
  class="shell-container"
  [class.has-toolbar]="isMobile()"
  [class.sidenav--compact-container]="isCompact()"
  [class.sidenav--mobile-container]="isMobile()"
>
  <mat-sidenav
    class="shell-sidenav"
    [class.sidenav--compact]="isCompact()"
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    (closedStart)="sidenavOpened.set(false)"
  >
    <div class="sidenav-inner">
      <div class="sidenav-header">
        <img src="/logo_02.svg" alt="Gestiora" class="sidenav-logo" />
        @if (!isCompact()) {
          <span class="sidenav-title">Gestiora</span>
        }
        @if (!isCompact() && !isMobile()) {
          <button
            mat-icon-button
            class="collapse-btn"
            (click)="toggleCollapse()"
            [attr.aria-label]="isCollapsed() ? 'Expandir menú' : 'Contraer menú'"
            matTooltip="Contraer menú"
            matTooltipPosition="right"
          >
            <mat-icon>chevron_left</mat-icon>
          </button>
        }
        @if (isCollapsed()) {
          <button
            mat-icon-button
            class="expand-btn"
            (click)="toggleCollapse()"
            aria-label="Expandir menú"
            matTooltip="Expandir menú"
            matTooltipPosition="right"
          >
            <mat-icon>chevron_right</mat-icon>
          </button>
        }
      </div>

      <mat-nav-list>
        <a
          mat-list-item
          routerLink="/dashboard"
          routerLinkActive="active-link"
          ariaCurrentWhenActive="page"
          [matTooltip]="isCompact() ? 'Dashboard' : ''"
          matTooltipPosition="right"
        >
          <mat-icon matListItemIcon>dashboard</mat-icon>
          @if (!isCompact()) {
            <span matListItemTitle>Dashboard</span>
          }
        </a>

        <a
          mat-list-item
          routerLink="/providers"
          routerLinkActive="active-link"
          ariaCurrentWhenActive="page"
          [matTooltip]="isCompact() ? 'Proveedores' : ''"
          matTooltipPosition="right"
        >
          <mat-icon matListItemIcon>business</mat-icon>
          @if (!isCompact()) {
            <span matListItemTitle>Proveedores</span>
          }
        </a>
      </mat-nav-list>

      <span class="sidenav-spacer"></span>

      <mat-divider />

      <mat-list>
        <mat-list-item
          class="logout-item"
          [class.logout-item--busy]="isLoggingOut()"
          [attr.aria-busy]="isLoggingOut()"
          [matTooltip]="isCompact() ? 'Cerrar sesión' : ''"
          matTooltipPosition="right"
          (click)="onLogout()"
        >
          @if (isLoggingOut()) {
            <mat-progress-spinner matListItemIcon diameter="18" mode="indeterminate" />
          } @else {
            <mat-icon matListItemIcon>logout</mat-icon>
          }
          @if (!isCompact()) {
            <span matListItemTitle>Cerrar sesión</span>
          }
        </mat-list-item>
      </mat-list>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
