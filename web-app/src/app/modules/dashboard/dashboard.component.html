<mat-toolbar class="dashboard-toolbar">
  <img src="/logo_02.svg" alt="Gestiora" class="toolbar-logo" />
  <span class="toolbar-title">Gestiora</span>

  <span class="toolbar-spacer"></span>

  <button
    mat-stroked-button
    class="logout-btn"
    [disabled]="isLoggingOut()"
    [attr.aria-busy]="isLoggingOut()"
    (click)="onLogout()"
  >
    @if (isLoggingOut()) {
      <mat-progress-spinner diameter="18" mode="indeterminate" />
    } @else {
      <ng-container>
        <mat-icon>logout</mat-icon>
        Cerrar sesión
      </ng-container>
    }
  </button>
</mat-toolbar>

<main class="dashboard-content">
  <h1>Dashboard</h1>
  <p>Bienvenido a Gestiora.</p>
</main>
